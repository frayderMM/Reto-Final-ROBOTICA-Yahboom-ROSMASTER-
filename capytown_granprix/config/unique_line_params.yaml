# Parametros de la logica unique_line (seguimiento de UNA sola pared
# lateral con LiDAR, chasis tipo Ackermann). Ver README_unique_line.md
# y sim_local/unique_line_report.md (10/10 SUCCESS con estos mismos
# valores, angulo final ~88 grados, sin colisiones).
#
# Editar SIEMPRE en el PC, luego commit + push + pull en el robot (ver
# FLUJO_DE_TRABAJO.md).

unique_line:
  ros__parameters:
    scan_topic: /scan
    odom_topic: /odom_raw
    cmd_vel_topic: /cmd_vel
    control_rate_hz: 20.0

    # Calibracion de montaje del LiDAR -- mismo robot fisico que el
    # resto del paquete, mismos valores ya validados con lidar_viz.py
    # (ver granprix_params.yaml, lidar_processor).
    front_offset_deg: 180.0
    invert_left_right: false

    # --- Lado a seguir (mutuamente excluyentes, ver unique_line_node.py) ---
    follow_right: true
    follow_left: false

    # --- Distancias clave (metros) ---
    target_wall_dist: 0.12
    emergency_stop_dist: 0.10
    front_blocked_dist: 0.36
    front_clear_dist: 0.44
    lost_wall_dist: 0.34
    reacquire_wall_dist: 0.28
    collision_radius: 0.075
    safety_side_dist: 0.092

    # --- Ganancias de control ---
    # Historial: 1.00/0.98/0.6 (original) -> 1.35/1.25/0.75 (subida junto
    # con la velocidad) -> 1.6/1.5/0.85 (correccion mas estricta, pedida
    # tras probar en pista). deadband_dist se DEJA IGUAL a proposito: en
    # simulador, bajarlo junto con Kp altos amplificaba el ruido del LiDAR
    # hasta rozar colision (probado: Kp_wall=1.7+deadband=0.012 fallaba
    # 2/10 con ruido). Con deadband sin tocar: 10/10 SUCCESS + 80/80 en
    # una prueba extra de robustez con mas semillas de ruido.
    Kp_wall: 1.6
    Kp_heading: 1.5
    deadband_dist: 0.024
    filter_alpha: 0.24
    w_limit: 0.85

    # --- Velocidades (m/s, rad/s) ---
    v_nom: 0.19
    v_align: 0.090
    v_corner: 0.065
    w_corner: 0.55
    v_clear: 0.095
    exterior_clear_dist: 0.18

    # --- Confirmaciones (ciclos de control seguidos) ---
    lost_required: 4
    clear_required: 4
    stable_required: 6
    blocked_required: 2

    # --- Tolerancias de alineacion ---
    align_tolerance_deg: 7.0
    stable_heading_tolerance_deg: 10.0
    stable_dist_tolerance_m: 0.04

    # --- LiDAR: rango util y tolerancia angular de muestreo ---
    range_min_m: 0.03
    range_max_m: 4.0
    sector_tol_deg: 1.0

    # Angulos discretos (grados) del cono frontal. Angostado de
    # +-12 a +-8: en pista real, +-12 alcanzaba a ver la pared lateral
    # seguida (a target_wall_dist=0.12m) como si fuera un obstaculo al
    # frente, disparando giros falsos (INTERIOR_TURN_90 sin que hubiera
    # nada realmente al frente). Si vuelve a pasar, angostar mas aqui
    # (o revisar primero la calibracion de front_offset_deg/
    # invert_left_right con lidar_viz.py -- ver UNIQUE_LINE_DEBUG.md).
    front_window_deg: [-8.0, -4.0, 0.0, 4.0, 8.0]

    # Diagnostico: log en cada cambio de estado (siempre) + log
    # periodico cada tantos segundos con front/wall_dist_f/side_min
    # aunque no cambie de estado. 0.0 = solo log de transiciones.
    diag_log_period_s: 1.0
